{% extends 'base.html' %}
{% block title %}로그인 - 팀 채팅{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>팀 채팅</h1>
    <p class="sub">닉네임만 입력하면 바로 입장합니다.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('pages.login_page') }}">
      <input type="text" name="nickname" placeholder="닉네임" maxlength="20" autofocus required>
      <button type="submit">입장하기</button>
    </form>
  </div>
</div>
{% endblock %}
