<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}내부망 팀 채팅{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block head %}{% endblock %}
</head>
<body data-nickname="{{ nickname|default('') }}">
<script src="{{ url_for('static', filename='js/vendor/socket.io.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/notify.js') }}"></script>
{% if nickname %}
<button type="button" id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="사이드바 토글">&#9776;</button>
<div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>
<aside id="sidebar" class="sidebar">
  <div class="sidebar-tabs">
    <button type="button" class="sidebar-tab active" data-tab="schedule">일정 관리</button>
    <button type="button" class="sidebar-tab" data-tab="excel">엑셀 변환</button>
  </div>

  <div class="sidebar-panel" data-panel="schedule">
    <div class="sched-calendar">
      <div class="sched-cal-header">
        <button type="button" id="sched-prev-month" class="btn-ghost">&lsaquo;</button>
        <span id="sched-cal-title" class="sched-cal-title"></span>
        <button type="button" id="sched-next-month" class="btn-ghost">&rsaquo;</button>
      </div>
      <div class="sched-cal-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div id="sched-cal-grid" class="sched-cal-grid"></div>
      <div class="sched-legend">
        <span class="sched-legend-item"><i class="sched-dot sched-dot-leave"></i>연차/반차</span>
        <span class="sched-legend-item"><i class="sched-dot sched-dot-work"></i>업무일정</span>
      </div>
    </div>

    <div class="sched-list-panel">
      <div class="sched-list-header">
        <span id="sched-list-title" class="sched-list-title"></span>
        <button type="button" id="sched-add-btn" class="btn-secondary">+ 일정 추가</button>
      </div>
      <ul id="sched-list" class="sched-list"></ul>

      <form id="sched-form" class="sched-form" hidden>
        <input type="hidden" id="sched-form-id">
        <label>구분
          <select id="sched-category">
            <option value="annual">연차</option>
            <option value="half_day">반차</option>
            <option value="work">업무일정</option>
          </select>
        </label>
        <label>날짜 <input type="date" id="sched-date" required></label>
        <label id="sched-time-row" class="sched-time-row" hidden>시간 <input type="time" id="sched-start-time"></label>
        <label>내용 <input type="text" id="sched-title" maxlength="100" placeholder="일정 내용 (연차/반차는 생략 가능)"></label>
        <p id="sched-error" class="error"></p>
        <div class="sched-form-actions">
          <button type="submit" class="btn-secondary">저장</button>
          <button type="button" id="sched-delete-btn" class="btn-danger" hidden>삭제</button>
          <button type="button" id="sched-cancel-btn" class="btn-ghost">취소</button>
        </div>
      </form>
    </div>
  </div>

  <div class="sidebar-panel" data-panel="excel" hidden>
    <div class="excel-section">
      <h3>CSV &harr; 엑셀 변환</h3>
      <p class="hint">CSV 파일은 엑셀로, 엑셀 파일은 CSV로 변환합니다.</p>
      <input type="file" id="excel-convert-input" accept=".csv,.xlsx,.xls">
      <button type="button" id="excel-convert-btn" class="btn-secondary">변환 후 다운로드</button>
      <p id="excel-convert-status" class="hint"></p>
    </div>
    <div class="excel-section">
      <h3>다중 파일 병합</h3>
      <p class="hint">첫 번째로 선택한 파일의 헤더를 기준으로 병합됩니다.</p>
      <input type="file" id="excel-merge-input" accept=".csv,.xlsx,.xls" multiple>
      <button type="button" id="excel-merge-btn" class="btn-secondary">병합 후 다운로드</button>
      <p id="excel-merge-status" class="hint"></p>
    </div>
  </div>
</aside>
<script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
<script src="{{ url_for('static', filename='js/schedule.js') }}"></script>
<script src="{{ url_for('static', filename='js/excel.js') }}"></script>
{% endif %}
{% block body %}{% endblock %}
</body>
</html>
